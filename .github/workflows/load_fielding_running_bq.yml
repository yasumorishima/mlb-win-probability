name: Load Fielding/Running Stats to BQ

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'Purpose of this run'
        required: true
        type: string
      start_year:
        description: 'Start year'
        required: false
        default: '2016'
      end_year:
        description: 'End year'
        required: false
        default: '2024'
      component:
        description: 'Which data to fetch (all/sprint/oaa/catcher)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - sprint
          - oaa
          - catcher

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pybaseball pandas pyarrow google-cloud-bigquery db-dtypes

      - name: Authenticate GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> $GITHUB_ENV

      - name: Fetch and load fielding/running stats
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        run: |
          EXTRA_ARGS=""
          if [ "${{ inputs.component }}" = "sprint" ]; then
            EXTRA_ARGS="--sprint-only"
          elif [ "${{ inputs.component }}" = "oaa" ]; then
            EXTRA_ARGS="--oaa-only"
          elif [ "${{ inputs.component }}" = "catcher" ]; then
            EXTRA_ARGS="--catcher-only"
          fi
          python scripts/fetch_fielding_running.py \
            --start-year ${{ inputs.start_year }} \
            --end-year ${{ inputs.end_year }} \
            --output-dir data/ \
            $EXTRA_ARGS

      - name: Upload CSVs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fielding-running-stats
          path: |
            data/statcast_sprint_speed.csv
            data/statcast_oaa.csv
            data/statcast_team_oaa.csv
            data/statcast_catcher.csv
          retention-days: 90

      - name: Job summary
        if: always()
        run: |
          echo "## Load Fielding/Running Stats to BQ" >> $GITHUB_STEP_SUMMARY
          echo "**Memo**: ${{ inputs.memo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Years**: ${{ inputs.start_year }}-${{ inputs.end_year }}" >> $GITHUB_STEP_SUMMARY
          echo "**Component**: ${{ inputs.component }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in data/statcast_sprint_speed.csv data/statcast_oaa.csv data/statcast_team_oaa.csv data/statcast_catcher.csv; do
            if [ -f "$f" ]; then
              rows=$(wc -l < "$f")
              echo "- $(basename $f): $((rows - 1)) rows" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$STATUS" = "success" ]; then
            BODY="**Load Fielding/Running BQ** ✅ ${{ inputs.component }} ${{ inputs.start_year }}-${{ inputs.end_year }} | ${RUN_URL}"
          else
            BODY="**Load Fielding/Running BQ** ❌ ${STATUS} | ${{ inputs.memo }} | ${RUN_URL}"
          fi
          PAYLOAD=$(python -c "import json,sys; print(json.dumps({'content': sys.argv[1]}))" "$BODY")
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
