name: Train Ensemble WP

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'Purpose of this run'
        required: true
        type: string
      test_year:
        description: 'Holdout test year'
        required: false
        default: '2024'
      cross_validate:
        description: 'Run leave-one-year-out CV'
        required: false
        type: boolean
        default: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install lightgbm scikit-learn numpy google-cloud-bigquery pandas pyarrow db-dtypes scipy

      - name: Authenticate GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> $GITHUB_ENV

      - name: Export play states from BQ
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        run: |
          python scripts/export_from_bq.py --output-dir data/

      - name: Download Statcast model from latest release
        run: |
          # Try to download the Statcast model artifact from latest successful run
          LATEST_RUN=$(gh run list --workflow="Train Statcast WP Model" --status=success --limit=1 --json databaseId -q '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$LATEST_RUN" ]; then
            echo "Downloading Statcast model from run $LATEST_RUN..."
            gh run download "$LATEST_RUN" --name statcast-wp-results --dir /tmp/statcast-results/ || true
            if [ -f /tmp/statcast-results/wp_statcast_lgbm.txt ]; then
              cp /tmp/statcast-results/wp_statcast_lgbm.txt data/
              echo "Statcast model loaded"
            else
              echo "Statcast model not found in artifact"
            fi
          else
            echo "No successful Statcast training run found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Train ensemble
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        run: |
          ARGS="--data-dir data/ --output-dir results/"
          if [ "${{ inputs.cross_validate }}" = "true" ]; then
            ARGS="$ARGS --cross-validate"
          else
            ARGS="$ARGS --test-year ${{ inputs.test_year }}"
          fi
          python scripts/ensemble_wp.py $ARGS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ensemble-wp-results
          path: |
            results/
          retention-days: 90

      - name: Job summary
        if: always()
        run: |
          echo "## Ensemble WP Results" >> $GITHUB_STEP_SUMMARY
          echo "**Memo**: ${{ inputs.memo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Test year**: ${{ inputs.test_year }}" >> $GITHUB_STEP_SUMMARY
          echo "**Cross-validate**: ${{ inputs.cross_validate }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f results/ensemble_weights.json ]; then
            python -c "
          import json
          r = json.load(open('results/ensemble_weights.json'))
          print('| Engine | Brier | Weight |')
          print('|--------|-------|--------|')
          for name, brier in sorted(r['engine_briers'].items()):
              w = r['weights'].get(name, 0)
              print(f'| {name} | {brier:.6f} | {w:.4f} |')
          print(f'| **Ensemble** | **{r[\"ensemble_brier\"]:.6f}** | — |')
          print(f'| **Calibrated** | **{r[\"calibrated_brier\"]:.6f}** | — |')
          print()
          print(f'ECE: {r[\"ensemble_ece\"]} → {r[\"calibrated_ece\"]} (calibrated)')
          " >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/ensemble_cv_results.json ]; then
            python -c "
          import json
          r = json.load(open('results/ensemble_cv_results.json'))
          print()
          print('### Cross-Validation Summary')
          print(f'- Mean v1 Brier: {r[\"mean_v1_brier\"]:.6f}')
          print(f'- Mean Ensemble Brier: {r[\"mean_ensemble_brier\"]:.6f} ({r[\"improvement_ensemble_pct\"]:+.2f}%)')
          print(f'- Mean Calibrated Brier: {r[\"mean_calibrated_brier\"]:.6f} ({r[\"improvement_calibrated_pct\"]:+.2f}%)')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ] && [ -f results/ensemble_weights.json ]; then
            METRICS=$(python -c "
          import json
          r = json.load(open('results/ensemble_weights.json'))
          engines = list(r['engine_briers'].keys())
          print(f'{len(engines)} engines: {\" + \".join(engines)}')
          print(f'Ensemble: {r[\"ensemble_brier\"]:.6f} | Calibrated: {r[\"calibrated_brier\"]:.6f}')
          best_name = min(r['engine_briers'], key=r['engine_briers'].get)
          best_val = r['engine_briers'][best_name]
          imp = (best_val - r['calibrated_brier']) / best_val * 100
          print(f'vs best ({best_name}): {imp:+.2f}%')
          ")
            BODY="**Ensemble WP** ✅ ${METRICS} | ${RUN_URL}"
          else
            BODY="**Ensemble WP** ❌ ${STATUS} | ${{ inputs.memo }} | ${RUN_URL}"
          fi

          PAYLOAD=$(python -c "import json,sys; print(json.dumps({'content': sys.argv[1]}))" "$BODY")
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
