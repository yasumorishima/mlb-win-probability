name: Verify BQ Data Integrity

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'Purpose of this run'
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-cloud-bigquery db-dtypes

      - name: Authenticate GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> $GITHUB_ENV

      - name: Verify BQ data integrity
        run: |
          python -c "
          from google.cloud import bigquery
          PROJECT = 'data-platform-490901'
          client = bigquery.Client(project=PROJECT)

          print('=' * 60)
          print('BQ TABLE SUMMARY')
          print('=' * 60)
          table_ds = {
              'statcast_pitches': 'mlb_shared',
              'fg_batting_stats': 'mlb_wp', 'fg_pitching_stats': 'mlb_wp',
              'play_states': 'mlb_wp',
              'statcast_sprint_speed': 'mlb_wp', 'statcast_oaa': 'mlb_wp',
              'statcast_team_oaa': 'mlb_wp', 'statcast_catcher': 'mlb_wp',
          }
          for tn, ds in table_ds.items():
              try:
                  t = client.get_table(f'{PROJECT}.{ds}.{tn}')
                  print(f'  {ds}.{tn}: {t.num_rows:,} rows, {len(t.schema)} cols, {t.num_bytes/1024**3:.2f} GB')
              except Exception as e:
                  print(f'  {ds}.{tn}: ERROR - {e}')

          print()
          print('=' * 60)
          print('PITCHER JOIN TEST (Statcast × FG pitching)')
          print('=' * 60)
          q = '''
          SELECT s.game_year,
            COUNT(*) AS total,
            COUNTIF(p.player_id IS NOT NULL) AS matched,
            ROUND(COUNTIF(p.player_id IS NOT NULL) / COUNT(*) * 100, 1) AS pct
          FROM \`data-platform-490901.mlb_shared.statcast_pitches\` s
          LEFT JOIN \`data-platform-490901.mlb_wp.fg_pitching_stats\` p
            ON CAST(s.pitcher AS INT64) = p.player_id
            AND CAST(s.game_year AS INT64) = CAST(p.season AS INT64)
          WHERE s.game_type = \"R\" AND s.events IS NOT NULL
          GROUP BY s.game_year ORDER BY s.game_year
          '''
          total_all, matched_all = 0, 0
          for row in client.query(q).result():
              print(f'  {int(row.game_year)}: {row.total:>8,} ABs, {row.pct}% pitcher matched')
              total_all += row.total; matched_all += row.matched
          print(f'  TOTAL: {total_all:,} ABs, {matched_all/total_all*100:.1f}% matched')

          print()
          print('=' * 60)
          print('BATTER JOIN TEST (Statcast × FG batting)')
          print('=' * 60)
          q2 = '''
          SELECT s.game_year,
            COUNT(*) AS total,
            COUNTIF(b.player_id IS NOT NULL) AS matched,
            ROUND(COUNTIF(b.player_id IS NOT NULL) / COUNT(*) * 100, 1) AS pct
          FROM \`data-platform-490901.mlb_shared.statcast_pitches\` s
          LEFT JOIN \`data-platform-490901.mlb_wp.fg_batting_stats\` b
            ON CAST(s.batter AS INT64) = b.player_id
            AND CAST(s.game_year AS INT64) = CAST(b.season AS INT64)
          WHERE s.game_type = \"R\" AND s.events IS NOT NULL
          GROUP BY s.game_year ORDER BY s.game_year
          '''
          total_all, matched_all = 0, 0
          for row in client.query(q2).result():
              print(f'  {int(row.game_year)}: {row.total:>8,} ABs, {row.pct}% batter matched')
              total_all += row.total; matched_all += row.matched
          print(f'  TOTAL: {total_all:,} ABs, {matched_all/total_all*100:.1f}% matched')

          print()
          print('=' * 60)
          print('STUFF+ NULL RATE BY YEAR')
          print('=' * 60)
          q3 = '''
          SELECT CAST(season AS INT64) AS yr, COUNT(*) AS n,
            ROUND(COUNTIF(Stuff_plus IS NULL) / COUNT(*) * 100, 1) AS null_pct
          FROM \`data-platform-490901.mlb_wp.fg_pitching_stats\`
          GROUP BY yr ORDER BY yr
          '''
          for row in client.query(q3).result():
              flag = ' OK' if row.null_pct in (0.0, 100.0) else ' ⚠ UNEXPECTED'
              print(f'  {row.yr}: {row.null_pct}% null{flag}')

          print()
          print('=' * 60)
          print('JOIN KEY TYPE CHECK')
          print('=' * 60)
          key_checks = [('statcast_pitches','pitcher'), ('statcast_pitches','batter'),
                          ('statcast_pitches','game_year'),
                          ('fg_pitching_stats','player_id'), ('fg_pitching_stats','season'),
                          ('fg_batting_stats','player_id'), ('fg_batting_stats','season')]
          for tn, col in key_checks:
              ds = 'mlb_shared' if tn == 'statcast_pitches' else 'mlb_wp'
              t = client.get_table(f'{PROJECT}.{ds}.{tn}')
              for f in t.schema:
                  if f.name == col:
                      print(f'  {tn}.{col}: {f.field_type}')
                      break

          print()
          print('=' * 60)
          print('SPRINT SPEED JOIN TEST (Statcast × Sprint)')
          print('=' * 60)
          q_sprint = '''
          SELECT s.game_year,
            COUNT(*) AS total,
            COUNTIF(sp.player_id IS NOT NULL) AS matched,
            ROUND(COUNTIF(sp.player_id IS NOT NULL) / COUNT(*) * 100, 1) AS pct
          FROM \`data-platform-490901.mlb_shared.statcast_pitches\` s
          LEFT JOIN \`data-platform-490901.mlb_wp.statcast_sprint_speed\` sp
            ON CAST(s.batter AS INT64) = CAST(sp.player_id AS INT64)
            AND CAST(s.game_year AS INT64) = CAST(sp.season AS INT64)
          WHERE s.game_type = \"R\" AND s.events IS NOT NULL
          GROUP BY s.game_year ORDER BY s.game_year
          '''
          total_all, matched_all = 0, 0
          for row in client.query(q_sprint).result():
              print(f'  {int(row.game_year)}: {row.total:>8,} ABs, {row.pct}% sprint matched')
              total_all += row.total; matched_all += row.matched
          print(f'  TOTAL: {total_all:,} ABs, {matched_all/total_all*100:.1f}% matched')

          print()
          print('=' * 60)
          print('TEAM OAA JOIN TEST (Statcast × Team OAA)')
          print('=' * 60)
          q_oaa = '''
          SELECT s.game_year,
            COUNT(*) AS total,
            COUNTIF(o.season IS NOT NULL) AS matched,
            ROUND(COUNTIF(o.season IS NOT NULL) / COUNT(*) * 100, 1) AS pct
          FROM (
            SELECT *, CASE WHEN inning_topbot = \"Bot\" THEN away_team ELSE home_team END AS fielding_team
            FROM \`data-platform-490901.mlb_shared.statcast_pitches\`
            WHERE game_type = \"R\" AND events IS NOT NULL
          ) s
          LEFT JOIN \`data-platform-490901.mlb_wp.statcast_team_oaa\` o
            ON s.fielding_team = o.team_abbrev
            AND CAST(s.game_year AS INT64) = CAST(o.season AS INT64)
          GROUP BY s.game_year ORDER BY s.game_year
          '''
          total_all, matched_all = 0, 0
          for row in client.query(q_oaa).result():
              print(f'  {int(row.game_year)}: {row.total:>8,} ABs, {row.pct}% team OAA matched')
              total_all += row.total; matched_all += row.matched
          print(f'  TOTAL: {total_all:,} ABs, {matched_all/total_all*100:.1f}% matched')

          print()
          print('=' * 60)
          print('CATCHER JOIN TEST (Statcast × Catcher)')
          print('=' * 60)
          q_catch = '''
          SELECT s.game_year,
            COUNT(*) AS total,
            COUNTIF(c.player_id IS NOT NULL) AS matched,
            ROUND(COUNTIF(c.player_id IS NOT NULL) / COUNT(*) * 100, 1) AS pct
          FROM \`data-platform-490901.mlb_shared.statcast_pitches\` s
          LEFT JOIN \`data-platform-490901.mlb_wp.statcast_catcher\` c
            ON CAST(s.fielder_2 AS INT64) = CAST(c.player_id AS INT64)
            AND CAST(s.game_year AS INT64) = CAST(c.season AS INT64)
          WHERE s.game_type = \"R\" AND s.events IS NOT NULL
          GROUP BY s.game_year ORDER BY s.game_year
          '''
          total_all, matched_all = 0, 0
          for row in client.query(q_catch).result():
              print(f'  {int(row.game_year)}: {row.total:>8,} ABs, {row.pct}% catcher matched')
              total_all += row.total; matched_all += row.matched
          print(f'  TOTAL: {total_all:,} ABs, {matched_all/total_all*100:.1f}% matched')

          print()
          print('=' * 60)
          print('FIELDING/RUNNING NULL RATE SUMMARY')
          print('=' * 60)
          for tn in ['statcast_sprint_speed', 'statcast_oaa', 'statcast_team_oaa', 'statcast_catcher']:
              t = client.get_table(f'{PROJECT}.mlb_wp.{tn}')
              q_null = f'SELECT * FROM \`{PROJECT}.mlb_wp.{tn}\` LIMIT 0'
              cols = [f.name for f in t.schema]
              print(f'  {tn}: {t.num_rows:,} rows, cols={cols[:5]}...')

          print()
          print('=== VERIFICATION COMPLETE ===')
          "

      - name: Job summary
        if: always()
        run: |
          echo "## BQ Data Integrity" >> $GITHUB_STEP_SUMMARY
          echo "**Memo**: ${{ inputs.memo }}" >> $GITHUB_STEP_SUMMARY
