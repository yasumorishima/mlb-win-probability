name: GCP Deploy (Cloud Run)

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図'
        required: true
        type: string

jobs:
  cloudrun-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="us-central1-docker.pkg.dev/data-platform-490901/apis/mlb-win-probability-api:$(date +%Y%m%d)-${{ github.run_number }}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mlb-win-probability-api \
            --image "${IMAGE}" \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 256Mi \
            --max-instances 1 \
            --min-instances 0 \
            --port 8080

      - name: Get Cloud Run URL
        id: url
        run: |
          URL=$(gcloud run services describe mlb-win-probability-api --region us-central1 --format 'value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Cloud Run URL: ${URL}"

      - name: Health check
        run: |
          URL="${{ steps.url.outputs.url }}"
          echo "Checking ${URL}/docs ..."
          curl -sf "${URL}/docs" || echo "Health check failed (cold start may take a moment)"

      - name: Notify Discord
        if: always()
        run: |
          URL="${{ steps.url.outputs.url }}"
          STATUS="${{ job.status }}"
          MEMO="${{ inputs.memo }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo 3066993 || echo 15158332)
          curl -sS -w "\nHTTP %{http_code}\n" -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"mlb-win-probability Cloud Run Deploy: ${STATUS}\",
                \"color\": ${COLOR},
                \"fields\": [
                  {\"name\": \"URL\", \"value\": \"${URL:-N/A}\", \"inline\": false},
                  {\"name\": \"Image\", \"value\": \"${IMAGE}\", \"inline\": false},
                  {\"name\": \"Memo\", \"value\": \"${MEMO}\", \"inline\": true},
                  {\"name\": \"Run\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                ]
              }]
            }"
        env:
          IMAGE: ${{ env.IMAGE }}
        continue-on-error: true
