name: Train Bayesian WP Model

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'Purpose of this run'
        required: true
        type: string
      n_steps:
        description: 'SVI optimization steps'
        required: false
        default: '20000'
      test_year:
        description: 'Holdout test year'
        required: false
        default: '2024'
      lr:
        description: 'Learning rate'
        required: false
        default: '0.005'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install numpyro jax jaxlib numpy scipy pandas

      - name: Train Bayesian WP model
        run: |
          python scripts/train_wp_bayesian.py \
            --data-dir data/ \
            --output-dir results/ \
            --test-year ${{ inputs.test_year }} \
            --n-steps ${{ inputs.n_steps }} \
            --lr ${{ inputs.lr }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bayesian-wp-results
          path: |
            results/
          retention-days: 90

      - name: Job summary
        if: always()
        run: |
          echo "## Bayesian Hierarchical WP Model Results" >> $GITHUB_STEP_SUMMARY
          echo "**Memo**: ${{ inputs.memo }}" >> $GITHUB_STEP_SUMMARY
          echo "**SVI steps**: ${{ inputs.n_steps }} | **LR**: ${{ inputs.lr }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/bayesian_results.json ]; then
            python -c "
          import json
          r = json.load(open('results/bayesian_results.json'))
          markov = r['markov_baseline']['brier']
          bayes = r['bayesian']['brier']
          bss = r['bayesian']['brier_skill']
          ece = r['bayesian']['ece']
          imp = r['improvement_vs_markov_pct']
          ci = r['bayesian'].get('ci_width_mean', 'N/A')
          print('| Metric | Value |')
          print('|--------|-------|')
          print(f'| Markov Baseline Brier | {markov} |')
          print(f'| **Bayesian Brier** | **{bayes}** |')
          print(f'| Brier Skill Score | {bss} |')
          print(f'| ECE | {ece} |')
          print(f'| Mean 90% CI Width | {ci} |')
          print(f'| **vs Markov** | **{imp:+.2f}%** |')
          print(f'| ELBO (final) | {r[\"final_elbo_loss\"]} |')
          " >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f results/bayesian_posterior.json ]; then
            python -c "
          import json
          p = json.load(open('results/bayesian_posterior.json'))
          teams = p['teams']
          strengths = p['team_strength_mean']
          ranked = sorted(zip(teams, strengths), key=lambda x: -x[1])
          print()
          print('### Team Strength Rankings')
          print('| Rank | Team | Strength |')
          print('|------|------|----------|')
          for i, (t, s) in enumerate(ranked[:10], 1):
              print(f'| {i} | {t} | {s:+.4f} |')
          print()
          print('### Hyperparameters')
          print(f'- sigma_team: {p[\"sigma_team_mean\"]:.4f}')
          print(f'- sigma_park: {p[\"sigma_park_mean\"]:.4f}')
          print(f'- sigma_season: {p[\"sigma_season_mean\"]:.4f}')
          print(f'- kappa (leverage interaction): {p[\"kappa_mean\"]:.4f}')
          print(f'- HFA correction: {p[\"hfa_correction_mean\"]:.4f}')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ] && [ -f results/bayesian_results.json ]; then
            METRICS=$(python -c "
          import json
          r = json.load(open('results/bayesian_results.json'))
          bayes = r['bayesian']['brier']
          imp = r['improvement_vs_markov_pct']
          ci = r['bayesian'].get('ci_width_mean', 'N/A')
          print(f'Brier: {bayes:.6f} ({imp:+.2f}% vs Markov)')
          print(f'CI width: {ci} | Steps: {r[\"n_steps\"]}')
          ")
            BODY="**Bayesian WP Model** ✅ ${METRICS} ${RUN_URL}"
          else
            BODY="**Bayesian WP Model** ❌ ${STATUS} | ${{ inputs.memo }} | ${RUN_URL}"
          fi

          PAYLOAD=$(python -c "import json,sys; print(json.dumps({'content': sys.argv[1]}))" "$BODY")
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
