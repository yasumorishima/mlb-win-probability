name: Reload Statcast BQ

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'Purpose of this run'
        required: true
        type: string
      start_year:
        description: 'Start year (inclusive)'
        required: false
        default: '2015'
      end_year:
        description: 'End year (inclusive)'
        required: false
        default: '2024'
      append:
        description: 'Append to existing table (do not truncate)'
        required: false
        type: boolean
        default: false

jobs:
  reload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pybaseball pandas pyarrow google-cloud-bigquery db-dtypes

      - name: Authenticate GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> $GITHUB_ENV

      - name: Fetch Statcast data (pybaseball)
        run: |
          python scripts/fetch_statcast_full.py \
            --start-year ${{ inputs.start_year }} \
            --end-year ${{ inputs.end_year }} \
            --output-dir data/statcast/

      - name: Load to BigQuery
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        run: |
          APPEND_FLAG=""
          if [ "${{ inputs.append }}" = "true" ]; then
            APPEND_FLAG="--append"
          fi
          python scripts/load_statcast_to_bq.py \
            --data-dir data/statcast/ \
            $APPEND_FLAG

      - name: Verify BQ table
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        run: |
          python -c "
          from google.cloud import bigquery
          client = bigquery.Client(project='data-platform-490901')
          table = client.get_table('data-platform-490901.mlb_shared.statcast_pitches')
          print(f'Rows: {table.num_rows:,}')
          print(f'Columns: {len(table.schema)}')
          print(f'Size: {table.num_bytes / 1024**3:.2f} GB')
          print()
          print('Schema (first 30):')
          for f in table.schema[:30]:
              print(f'  {f.name}: {f.field_type}')
          if len(table.schema) > 30:
              print(f'  ... and {len(table.schema) - 30} more columns')
          "

      - name: Job summary
        if: always()
        run: |
          echo "## Reload Statcast BQ" >> $GITHUB_STEP_SUMMARY
          echo "**Memo**: ${{ inputs.memo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Years**: ${{ inputs.start_year }}-${{ inputs.end_year }}" >> $GITHUB_STEP_SUMMARY
          echo "**Append**: ${{ inputs.append }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          try:
              from google.cloud import bigquery
              client = bigquery.Client(project='data-platform-490901')
              table = client.get_table('data-platform-490901.mlb_shared.statcast_pitches')
              print(f'| Metric | Value |')
              print(f'|--------|-------|')
              print(f'| Rows | {table.num_rows:,} |')
              print(f'| Columns | {len(table.schema)} |')
              print(f'| Size | {table.num_bytes / 1024**3:.2f} GB |')
          except Exception as e:
              print(f'BQ verification failed: {e}')
          " >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            METRICS=$(python -c "
          from google.cloud import bigquery
          client = bigquery.Client(project='data-platform-490901')
          table = client.get_table('data-platform-490901.mlb_shared.statcast_pitches')
          print(f'{table.num_rows:,} rows / {len(table.schema)} cols / {table.num_bytes / 1024**3:.2f} GB')
          " 2>/dev/null || echo "BQ query failed")
            BODY="**Reload Statcast BQ** ✅ ${{ inputs.start_year }}-${{ inputs.end_year }} (append=${{ inputs.append }}) | ${METRICS} | ${RUN_URL}"
          else
            BODY="**Reload Statcast BQ** ❌ ${STATUS} | ${{ inputs.memo }} | ${RUN_URL}"
          fi

          PAYLOAD=$(python -c "import json,sys; print(json.dumps({'content': sys.argv[1]}))" "$BODY")
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
