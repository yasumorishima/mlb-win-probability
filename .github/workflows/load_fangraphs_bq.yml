name: Load FanGraphs Stats to BQ

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'Purpose of this run'
        required: true
        type: string
      start_year:
        description: 'Start year'
        required: false
        default: '2015'
      end_year:
        description: 'End year'
        required: false
        default: '2024'

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pybaseball pandas pyarrow google-cloud-bigquery db-dtypes

      - name: Authenticate GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> $GITHUB_ENV

      - name: Fetch and load FanGraphs stats
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
        run: |
          python scripts/fetch_fangraphs_stats.py \
            --start-year ${{ inputs.start_year }} \
            --end-year ${{ inputs.end_year }} \
            --output-dir data/

      - name: Upload CSVs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fg-stats
          path: data/fg_*.csv
          retention-days: 90

      - name: Job summary
        if: always()
        run: |
          echo "## Load FanGraphs Stats to BQ" >> $GITHUB_STEP_SUMMARY
          echo "**Memo**: ${{ inputs.memo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Years**: ${{ inputs.start_year }}-${{ inputs.end_year }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in data/fg_*.csv; do
            if [ -f "$f" ]; then
              rows=$(wc -l < "$f")
              echo "- $(basename $f): $((rows - 1)) rows" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$STATUS" = "success" ]; then
            BODY="**Load FanGraphs BQ** ✅ ${{ inputs.start_year }}-${{ inputs.end_year }} | ${RUN_URL}"
          else
            BODY="**Load FanGraphs BQ** ❌ ${STATUS} | ${{ inputs.memo }} | ${RUN_URL}"
          fi
          PAYLOAD=$(python -c "import json,sys; print(json.dumps({'content': sys.argv[1]}))" "$BODY")
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
